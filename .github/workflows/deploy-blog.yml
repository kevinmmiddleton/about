name: Publish blog

# Builds /blog/ from markdown in blog/_posts/ (authored via Sveltia CMS at
# /admin). A push that changes a post or the generator triggers a rebuild; the
# generated HTML is committed back (push to main -> GitHub Pages deploys).
# No secrets needed. Triggers:
#   - push to main touching posts/generator (the normal publish path)
#   - workflow_dispatch: run manually from the Actions tab
#   - schedule: once-daily safety net
on:
  push:
    branches: [main]
    paths:
      - 'blog/_posts/**'
      - 'tools/blog-generate.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

concurrency:
  group: publish-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Build /blog from markdown
        run: node tools/blog-generate.mjs
      - name: Commit & push if the output changed
        run: |
          git config user.name "blog-bot"
          git config user.email "noreply@middleton.io"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-build blog from markdown"
            git push
            echo "Published changes."
          else
            echo "No changes to publish."
          fi
