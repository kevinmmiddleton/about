<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Epilogue:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  html, body { margin:0; padding:0; width:1200px; height:630px; overflow:hidden; }
  .export-btn { position:absolute; bottom:20px; right:20px; background:rgba(255,255,255,0.15); padding:12px 20px; border-radius:8px; color:white; font-size:20px; cursor:pointer; backdrop-filter:blur(6px); display:block; z-index: 10; }

  body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    position: relative;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('images/hero-skyline-light.jpg') center/cover no-repeat;
    z-index: 0;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 35, 66, 0.5);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .name {
    font-family: 'Epilogue', sans-serif;
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .subtitle {
    font-size: 36px;
    font-weight: 600;
    opacity: 0.9;
    margin-top: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .tagline {
    display: none;
  }

  .badge {
    display: none;
  }

  .url {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    z-index: 2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
</style>
</head>

<body>
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="export-btn" onclick="downloadOG()">Download PNG</div>

  <div class="content">
    <div class="badge">Full-Stack Product Manager · NYC</div>
    <div class="name">Kevin Middleton</div>
    <div class="tagline">I build platforms, tools, and AI workflows that connect teams and systems.</div>
  </div>

  <div class="url">middleton.io</div>

<script>
  function downloadOG(){
    const btn = document.querySelector('.export-btn');
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';

    html2canvas(document.body, {useCORS:true, width:1200, height:630, windowWidth:1200, windowHeight:630, scale:2}).then(canvas=>{
      const link=document.createElement('a');
      link.download='kevin-middleton-og.png';
      link.href=canvas.toDataURL();
      link.click();

      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    });
  }
</script>
</body>
</html>
